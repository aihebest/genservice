# =============================================================================
#  Nginx reverse proxy — Demo environment gateway
#  Sits on port 80. Routes:
#    /api/*  →  backend API container (gs-demo-api:8080)
#    /*      →  frontend container    (gs-demo-web:80)
# =============================================================================

upstream api_backend {
    server api-demo:8080;
}

upstream frontend_app {
    server frontend-demo:80;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 20M;

    # ── API proxy ────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://api_backend/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto http;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ── Health endpoint (for demo: show green status) ────────────────────────
    location /health {
        proxy_pass http://api_backend/health;
    }

    # ── Frontend SPA ─────────────────────────────────────────────────────────
    location / {
        proxy_pass         http://frontend_app/;
        proxy_http_version 1.1;
        proxy_set_header   Host  $host;
        proxy_read_timeout 30s;
    }

    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1024;
}
