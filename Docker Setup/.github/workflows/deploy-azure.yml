# =============================================================================
#  GitHub Actions — Azure Deployment Pipeline
#  Deploys on every push to main:
#    • Backend  (.NET 8 API) → Azure App Service (Linux, B1)
#    • Frontend (React/Vite) → Azure Static Web Apps (Free tier)
#
#  Required GitHub Secrets (Settings → Secrets → Actions):
#    AZURE_WEBAPP_PUBLISH_PROFILE   — Download from Azure Portal → App Service → "Get publish profile"
#    AZURE_STATIC_WEB_APPS_API_TOKEN — Shown when you create the Static Web App resource
#    AZURE_SQL_CONNECTION_STRING     — From Azure SQL Database → Connection strings → ADO.NET
#
#  Required GitHub Variables (Settings → Variables → Actions):
#    AZURE_WEBAPP_NAME               — genservice-desicon
#    VITE_API_URL                    — https://genservice-desicon.azurewebsites.net
#    VITE_ENTRA_CLIENT_ID            — d1e4eeaa-1fb5-450d-a73f-410ad68f8efa  (App registration Client ID)
#    VITE_ENTRA_TENANT_ID            — your-tenant-id  (Azure AD Tenant ID)
# =============================================================================

name: Deploy to Azure

on:
  push:
    branches: [ main ]
  workflow_dispatch:        # allow manual trigger from GitHub Actions tab

jobs:

  # ── Job 1: Build & deploy backend ──────────────────────────────────────────
  deploy-backend:
    name: Backend → Azure App Service
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore packages
        working-directory: Docker Setup/backend
        run: dotnet restore

      - name: Build (Release)
        working-directory: Docker Setup/backend
        run: dotnet build -c Release --no-restore

      - name: Publish
        working-directory: Docker Setup/backend
        run: |
          dotnet publish src/GenService.API/GenService.API.csproj \
            -c Release \
            --no-build \
            -o ./publish

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name:       ${{ vars.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package:        Docker Setup/backend/publish

  # ── Job 2: Build & deploy frontend ─────────────────────────────────────────
  deploy-frontend:
    name: Frontend → Azure Static Web Apps
    runs-on: ubuntu-latest
    needs: deploy-backend        # wait for API to be live before building the frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'Docker Setup/frontend/package-lock.json'

      - name: Install dependencies
        working-directory: Docker Setup/frontend
        run: npm ci

      - name: Build frontend
        working-directory: Docker Setup/frontend
        env:
          VITE_API_URL:          ${{ vars.VITE_API_URL }}
          VITE_ENTRA_CLIENT_ID:  ${{ vars.VITE_ENTRA_CLIENT_ID }}
          VITE_ENTRA_TENANT_ID:  ${{ vars.VITE_ENTRA_TENANT_ID }}
        run: npm run build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token:                       ${{ secrets.GITHUB_TOKEN }}
          action:                           upload
          app_location:                     Docker Setup/frontend
          output_location:                  dist
          skip_app_build:                   true   # already built above
